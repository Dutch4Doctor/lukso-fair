<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LUKSO Fair - Emergency Withdraw</title>
<style>
body{font-family:sans-serif;background:#1a0a2e;color:white;padding:20px;max-width:600px;margin:0 auto}
h1{color:#f5c842}
button{background:#c0392b;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin:10px 0;width:100%}
button:hover{background:#e74c3c}
.info{background:rgba(255,255,255,0.1);padding:12px;border-radius:8px;margin:10px 0;font-size:13px}
.success{background:rgba(0,255,0,0.2);padding:12px;border-radius:8px;margin:10px 0}
.error{background:rgba(255,0,0,0.2);padding:12px;border-radius:8px;margin:10px 0}
</style>
</head>
<body>
<h1>⚠️ Emergency Withdraw</h1>
<p>Haal je budget op uit oude sessie contracten.</p>

<div class="info">
<b>Oud contract (SPIN token sessie):</b><br>
0xa4c687cC1802c9ce9B6b024E46129fE3c645fe97
</div>
<button onclick="withdraw('0xa4c687cC1802c9ce9B6b024E46129fE3c645fe97')">
  Withdraw van 0xa4c687...
</button>

<div class="info">
<b>Oud contract 2:</b><br>
0xB2eAa3f36b8D9dA7F73b00d95c662898f9Ad1E74
</div>
<button onclick="withdraw('0xB2eAa3f36b8D9dA7F73b00d95c662898f9Ad1E74')">
  Withdraw van 0xB2eAa3...
</button>

<div class="info">
<b>Huidig contract:</b><br>
0x0B4C816E22681b512a6E523ce862fd634104c1A9
</div>
<button onclick="withdraw('0x0B4C816E22681b512a6E523ce862fd634104c1A9')">
  Withdraw van huidig contract
</button>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
<script>
const SM_ABI = ["function emergencyWithdraw() external"];

async function withdraw(contractAddr) {
  const log = document.getElementById('log');
  try {
    const provider = window.lukso || window.ethereum;
    if(!provider) { log.innerHTML = '<div class="error">Geen wallet gevonden!</div>'; return; }
    
    const ep = new ethers.BrowserProvider(provider);
    const signer = await ep.getSigner();
    log.innerHTML = '<div class="info">Transactie versturen naar ' + contractAddr.slice(0,10) + '...</div>';
    
    const sm = new ethers.Contract(contractAddr, SM_ABI, signer);
    const tx = await sm.emergencyWithdraw({ gasLimit: 150000 });
    log.innerHTML = '<div class="info">Wachten op bevestiging...</div>';
    await tx.wait();
    log.innerHTML = `<div class="success">✅ Withdraw geslaagd! Tx: ${tx.hash.slice(0,20)}...</div>`;
  } catch(e) {
    log.innerHTML = `<div class="error">❌ Fout: ${e.message.slice(0,100)}</div>`;
  }
}
</script>
</body>
</html>
